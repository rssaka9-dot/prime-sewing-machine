<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="195" fill="#FFFFFF" stroke="#D4AF37" stroke-width="4"/>
  
  <!-- Gold accents -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
  
  <!-- Sewing Machine Body (Black) -->
  <g id="machine">
    <!-- Main body -->
    <rect x="80" y="140" width="240" height="140" rx="15" fill="#1A1A1A"/>
    
    <!-- Machine base/platform -->
    <ellipse cx="200" cy="290" rx="130" ry="25" fill="#0047AB"/>
    
    <!-- Presser foot area -->
    <rect x="175" y="265" width="50" height="35" fill="#1A1A1A" rx="5"/>
    
    <!-- Needle area highlight -->
    <circle cx="200" cy="275" r="8" fill="#D4AF37"/>
    
    <!-- Thread spool area -->
    <circle cx="140" cy="155" r="20" fill="#0047AB" stroke="#D4AF37" stroke-width="2"/>
    <circle cx="140" cy="155" r="15" fill="#1A1A1A"/>
    <circle cx="140" cy="155" r="8" fill="#0047AB"/>
    
    <!-- Wheel (flywheel) -->
    <circle cx="320" cy="210" r="35" fill="none" stroke="#D4AF37" stroke-width="3"/>
    <circle cx="320" cy="210" r="30" fill="none" stroke="#0047AB" stroke-width="2"/>
    <!-- Wheel spokes -->
    <line x1="320" y1="180" x2="320" y2="240" stroke="#D4AF37" stroke-width="2"/>
    <line x1="290" y1="210" x2="350" y2="210" stroke="#D4AF37" stroke-width="2"/>
    <line x1="295" y1="185" x2="345" y2="235" stroke="#0047AB" stroke-width="1.5"/>
    <line x1="345" y1="185" x2="295" y2="235" stroke="#0047AB" stroke-width="1.5"/>
    
    <!-- Top panel detail -->
    <rect x="100" y="150" width="200" height="25" fill="#0047AB" rx="5"/>
    
    <!-- Stitching indicator lights -->
    <circle cx="120" cy="162" r="4" fill="#D4AF37"/>
    <circle cx="140" cy="162" r="4" fill="#D4AF37"/>
    <circle cx="160" cy="162" r="4" fill="#D4AF37"/>
    
    <!-- Control knobs -->
    <circle cx="260" cy="155" r="8" fill="#D4AF37" stroke="#1A1A1A" stroke-width="2"/>
    <circle cx="280" cy="155" r="8" fill="#D4AF37" stroke="#1A1A1A" stroke-width="2"/>
  </g>
  
  <!-- Needle and Thread (forming subtle "P") -->
  <g id="needle-thread">
    <!-- Needle -->
    <line x1="200" y1="100" x2="200" y2="140" stroke="#D4AF37" stroke-width="3" stroke-linecap="round"/>
    <circle cx="200" cy="95" r="4" fill="#D4AF37"/>
    
    <!-- Thread curve (P shape suggestion) -->
    <path d="M 200 140 Q 220 120 220 100" stroke="#0047AB" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Company Name -->
  <text x="200" y="340" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#1A1A1A">
    PRIME
  </text>
  <text x="200" y="365" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#0047AB" letter-spacing="2">
    SEWING MACHINE
  </text>
  
  <!-- Tagline -->
  <text x="200" y="385" font-family="Inter, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#D4AF37" opacity="0.8">
    Premium Quality • Expert Guidance
  </text>
</svg>
